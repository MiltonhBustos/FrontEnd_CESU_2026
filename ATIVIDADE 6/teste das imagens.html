<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    
    <title>Meu bixo</title>

    <style>
        body {
            transition: background 1.5s ease-in-out;
        }

        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .star {
            position: absolute;
            width: 5px;
            height: 5px;
            background: rgb(255, 251, 13);
            border-radius: 50%;
            animation: brilho 2s infinite alternate;
        }

        #clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden; 
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
        }

        .cloud::before,
        .cloud::after {
            content: "";
            position: absolute;
            background: white;
            border-radius: 50%;
        }        

        .cloud::before {
            width: 50px;
            height: 50px;
            top: -20px;
            left: 10px;
        }

        .cloud::after {
            width: 70px;
            height: 70px;
            top: -30px;
            left: 40px;
        }

        @keyframes moverNuvem {
            from {
                transform: translateX(-30vw);
            }
            to {
                transform: translateX(110vw);
            }
        }

        .cloud {
            animation: moverNuvem linear infinite;
        }

        @keyframes brilho {
            from { opacity: 0.2; }
            to { opacity: 1; }
        }

        .noite #stars {
            opacity: 1;
        }
    </style>
</head>

<body class="bg-pink-50 min-h-screen flex flex-col"
style="
    background-image: url('bg_d.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
">
    <div id="stars"></div>
    <div id="clouds"></div>

    <div class="w-full flex items-center justify-between p-4 gap-4">

        <div class="flex items-center gap-4">
            <div class="avatar">
              <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                <img src="feliz.png" />
              </div>
            </div>

            <input 
              type="text" 
              placeholder="Nome da criatura..." 
              class="input input-secondary"
            />
        </div>

        <label class="flex cursor-pointer gap-2 items-center">
            🌞
            <input id="toggleTema" type="checkbox" class="toggle toggle-warning"/>
            🌙
        </label>

    </div>

    <div class="flex flex-col items-center w-full px-4">

        <img 
          id="bixo"
          src="botao.png"
          alt="Imagem principal"
          class="w-full max-w-md h-auto"
        />

        <div class="mt-12 flex justify-center w-full">
          <img 
            id="botao"
            src="botao.png"
            alt="Botão"
            class="w-1/3 max-w-[180px] h-auto active:scale-95 transition"
            onclick="alimentar()"
          />
        </div>

    </div>

    <div class="relative inline-block">
 
  <img 
    src="icone.png"
    onclick="mostrarFoto()"
    class="absolute top-2 right-2 w-20 opacity-60 hover:opacity-100 cursor-pointer transition"
  />

</div>

<img 
  id="fotoSecreta"
  src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSlLM8xGALAsp4g_4cMvg4vbwyJCXe6ZZASXQ&s"
  class="fixed bottom-5 right-5 w-100 rounded-lg shadow-xl opacity-0 scale-75 transition duration-500"
/>
  
</body>

<script src="script.js"></script>
</html>
